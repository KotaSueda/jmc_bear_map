name: Daily Data Update

# いつ実行するかを設定
on:
  schedule:
    # 毎日UTC（協定世界時）の12:00＝日本時間の21:00に実行
    - cron: '0 12 * * *'
  # 手動でも実行できるようにする
  workflow_dispatch:

# 実行する内容
jobs:
  update-data:
    runs-on: ubuntu-latest # GitHubが用意する最新のLinuxサーバーを使用

    steps:
      # 1. リポジトリのデータをサーバーにダウンロード
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python環境を準備（バージョンは適宜変更可能）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 必要なライブラリをインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      # 4. スクレイピングのPythonコードを実行（ファイル名に合わせてください）
      - name: Run scraping script
        run: python scrape.py

      # 5. 生成されたCSVをGitでコミットしてプッシュ（更新）
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # もしデータに変化があればコミットし、なければ何もしない
          git commit -m "Automated data update" || echo "No changes to commit"
          git push
